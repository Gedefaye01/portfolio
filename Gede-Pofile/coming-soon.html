<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | Gedefaye Anteneh</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        :root {
            --primary-maroon: #5b9296;
            --secondary-gold: #FFD700;
            --background-dark: #b49595;
            --text-light: #f4f7f6;
            --text-dark: #423333;
            --card-dark: #423333;
            --card-light: #e9ecef;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.4s, color 0.4s;
            margin: 0;
        }
        
        [data-theme="light"] body {
            background-color: var(--card-light);
            color: var(--text-dark);
        }

        [data-theme="dark"] body {
            background-color: var(--background-dark);
            color: var(--text-light);
        }

        .coming-soon-container {
            padding: 2rem;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: background-color 0.4s, color 0.4s;
        }
        [data-theme="light"] .coming-soon-container {
            background-color: white;
        }
        [data-theme="dark"] .coming-soon-container {
            background-color: var(--card-dark);
        }

        .coming-soon-title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--secondary-gold);
        }

        .coming-soon-text {
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }

        .back-link {
            font-size: 1rem;
            color: var(--primary-maroon);
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #4f6e7a;
            text-decoration: underline;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="coming-soon-container">
        <h1 class="coming-soon-title">Coming Soon !!!</h1>
        <p class="coming-soon-text">
            I am currently working hard to bring this project to life. Stay tuned for updates!
        </p>
        <a href="index.html" class="back-link">
            &larr; Back to Portfolio
        </a>
    </div>

</body>
</html>
